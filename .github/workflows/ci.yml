name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Lint & type-check (fast, no external service deps)
  # -------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff (linter)
        run: ruff check src/ config/ tests/ --output-format=github

      - name: Run ruff format check
        run: ruff format src/ config/ tests/ --check

      - name: Run mypy (type checker)
        run: mypy src/ config/ --ignore-missing-imports --no-strict-optional

  # -------------------------------------------------------------------------
  # Unit tests + coverage
  # -------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fueltracks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Use the test Postgres instance for integration tests
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fueltracks_test
      # Stub out external API keys so tests never make real network calls
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'test-key' }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || 'test-key' }}
      SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY || 'test-key' }}
      EXOTEL_API_KEY: ${{ secrets.EXOTEL_API_KEY || 'test-key' }}
      EXOTEL_API_TOKEN: ${{ secrets.EXOTEL_API_TOKEN || 'test-token' }}
      EXOTEL_ACCOUNT_SID: ${{ secrets.EXOTEL_ACCOUNT_SID || 'test-sid' }}
      EXOTEL_CALLER_ID: "0000000000"
      VAD_MODE: energy  # Use energy VAD in CI (no native libs needed)
      SECRET_KEY: ci-test-secret-key-replace-in-prod
      LOG_LEVEL: WARNING

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install production dependencies
        run: pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Wait for Postgres to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 1
          done

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov=config \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60 \
            -v \
            --timeout=30 \
            -x

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # -------------------------------------------------------------------------
  # Docker build validation (no push on PRs)
  # -------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: fueltracks-voice-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # Docker push to GHCR (only on main branch merge)
  # -------------------------------------------------------------------------
  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
